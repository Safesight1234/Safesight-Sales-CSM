<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales and numbers — Safesight</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ===== Login gate ===== -->
  <div id="login" class="login-screen" hidden>
    <div class="login-card">
      <img src="logo.png" class="login-logo" alt="Safesight" />
      <h1 class="login-title">Safesight dashboarding</h1>
      <p class="login-sub">Enter the password to continue</p>
      <form id="login-form" class="login-form" autocomplete="off" onsubmit="return false">
        <div class="login-field">
          <input id="login-pw" type="password" placeholder="Password" autocomplete="current-password" />
          <button type="button" id="login-toggle" class="login-eye" aria-label="Show password" tabindex="-1">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div id="login-error" class="login-error" hidden>Incorrect password. Please try again.</div>
        <button type="submit" class="login-btn">Unlock dashboard</button>
      </form>
    </div>
  </div>

  <div id="root" hidden></div>

  <script>
  /* Login gate — inlined so there is no separate file to cache or misplace.
     Client-side only: deters casual access; not strong security. */
  (function () {
    var PASSWORD = 'lEidTlhN7Lg#Xs6%';
    var KEY = 'safesight_auth_v1';
    var login = document.getElementById('login');
    var root = document.getElementById('root');

    function reveal() {
      if (login) login.hidden = true;
      if (root) root.hidden = false;
      document.documentElement.classList.remove('locked');
    }

    var unlocked = false;
    try { unlocked = sessionStorage.getItem(KEY) === '1'; } catch (e) {}
    if (unlocked) { reveal(); return; }

    document.documentElement.classList.add('locked');
    if (login) login.hidden = false;
    if (root) root.hidden = true;

    function tryUnlock() {
      var pw = document.getElementById('login-pw');
      var err = document.getElementById('login-error');
      var entered = pw ? String(pw.value).trim() : '';
      if (entered === PASSWORD) {
        try { sessionStorage.setItem(KEY, '1'); } catch (e2) {}
        reveal();
        return true;
      }
      if (err) err.hidden = false;
      if (pw) { pw.value = ''; pw.focus(); }
      var card = document.querySelector('.login-card');
      if (card) { card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake'); }
      return false;
    }

    var form = document.getElementById('login-form');
    var pw = document.getElementById('login-pw');
    var err = document.getElementById('login-error');
    var toggle = document.getElementById('login-toggle');
    var btn = document.querySelector('.login-btn');

    if (form) form.addEventListener('submit', function (e) { e.preventDefault(); e.stopPropagation(); tryUnlock(); return false; });
    if (btn) btn.addEventListener('click', function (e) { e.preventDefault(); tryUnlock(); });
    if (pw) pw.addEventListener('keydown', function (e) { if (e.key === 'Enter') { e.preventDefault(); tryUnlock(); } });
    if (pw && err) pw.addEventListener('input', function () { err.hidden = true; });
    if (toggle && pw) toggle.addEventListener('click', function () {
      pw.type = pw.type === 'password' ? 'text' : 'password';
      toggle.classList.toggle('on', pw.type === 'text');
    });
    if (pw) setTimeout(function () { try { pw.focus(); } catch (e) {} }, 80);
  })();
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script src="export.js"></script>
  <script type="text/babel" src="charts.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="tab_overview.jsx"></script>
  <script type="text/babel" src="tab_pipeline.jsx"></script>
  <script type="text/babel" src="tab_financials.jsx"></script>
  <script type="text/babel" src="tab_historicals.jsx"></script>
  <script type="text/babel" src="tab_csm.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
